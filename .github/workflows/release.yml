name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.22" # Se ajustará según tu versión de Go
          cache: true

      - name: Build for Linux (amd64)
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o snet-linux-amd64 ./cmd/snet/
      
      - name: Build for Linux (arm64)
        run: |
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o snet-linux-arm64 ./cmd/snet/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            snet-linux-amd64
            snet-linux-arm64
          generate_release_notes: true
